name: Build and Push All Images

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Action lấy code từ Github
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2: Action Đăng nhập Docker Hub
      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.NIGAUSERNAME }}
          password: ${{ secrets.NIGAPASSWORD }}

      # Step 3: Action Đóng gói & Đẩy Image (Backend)
      - name: Build and Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./VoTruongHuy_2280601278
          file: ./VoTruongHuy_2280601278/Dockerfile
          push: true
          tags: ${{ secrets.NIGAUSERNAME }}/bai-tap-1:latest

      # Step 3: Action Đóng gói & Đẩy Image (Frontend)
      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend-react
          file: ./frontend-react/Dockerfile
          push: true
          tags: ${{ secrets.NIGAUSERNAME }}/bai-tap-2:latest
