name: Build and Push Backend Image

on:
  push:
    branches: ["main", "master"]
    paths:
      - "VoTruongHuy_2280601278/**"
  workflow_dispatch:

jobs:
  build_backend:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Action lấy code từ Github.
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2: Action Đăng nhập Docker Hub
      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}

      # Step 3: Action Đóng gói & Đẩy Image
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./VoTruongHuy_2280601278
          file: ./VoTruongHuy_2280601278/Dockerfile
          push: true
          tags: ${{ secrets.USERNAME }}/bai-tap-1:latest
