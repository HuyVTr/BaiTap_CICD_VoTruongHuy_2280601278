services:
  # Backend Spring Boot (Bài 1)
  app-java:
    build: 
      context: ./VoTruongHuy_2280601278
      dockerfile: Dockerfile
    image: hhhhhvvvvv/bai-tap-1:latest
    ports:
      - "8080:8080"
    depends_on:
      - db-mysql
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db-mysql:3306/demo_docker_db?useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root

  # Frontend React (Bài 2 Extension)
  app-react:
    build:
      context: ./frontend-react
      dockerfile: Dockerfile
    image: hhhhhvvvvv/bai-tap-2:latest
    ports:
      - "3000:80"
    depends_on:
      - app-java

  # Database MySQL
  db-mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: demo_docker_db
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
